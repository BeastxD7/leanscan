# nginx site config for LeanScan API.
#
# Install on the droplet:
#   sudo cp deploy/nginx/leanscan.conf /etc/nginx/sites-available/leanscan.conf
#   sudo ln -s /etc/nginx/sites-available/leanscan.conf /etc/nginx/sites-enabled/leanscan.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then get a TLS cert (rewrites this file to add the HTTPS server block + redirect):
#   sudo certbot --nginx -d api.leanscan.app
#
# After certbot, this file will contain BOTH an HTTPS block (port 443) and a redirect
# block (port 80 → https). certbot renews automatically via systemd timer.

server {
    listen 80;
    listen [::]:80;
    server_name api.leanscan.app;

    # Match UPLOADS_MAX_BYTES in api/.env (10 MB). Bump if you increase it.
    client_max_body_size 10M;

    # Hide nginx version in headers / error pages.
    server_tokens off;

    # Basic security headers (terminated at nginx, not the app).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Don't pollute access logs with health probes.
    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Forward client info so the API sees real IPs and original scheme.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket upgrade (harmless if unused).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long enough for AI vision calls (Bedrock can take 10-20s).
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Don't buffer streaming/SSE responses.
        proxy_buffering off;
    }
}
